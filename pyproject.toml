[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["*Test"]
python_functions = ["test_*"]
addopts = "-q"

[tool.ruff]
target-version = "py313"
line-length = 140
exclude = [
  ".git",
  ".venv",
  "__pycache__",
  "data",
  "media",
]

[tool.ruff.lint]
select = ["E", "F"]
